name: Clang format

on: [push]

jobs:
  clang-format:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: cpp-linter/cpp-linter-action@77c390c5ba9c947ebc185a3e49cc754f1558abb5
        id: linter
        with:
          version: 22
          style: file
      - name: Fail fast
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1
